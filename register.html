                    <form id="form-box" onsubmit="return register()">

<!-- JAVASCRIPT LOGIN -->
    <script>
        function register(){
            
            let username = document.getElementById("username").value.trim()
            let nohp = document.getElementById("nohp").value.trim()
            let password = document.getElementById("password").value.trim()

            // validasi kosong
            if(!username || !nohp || !password){
                alert("Semua data harus diisi")
                return false
            }

            // ambil akun
            let akun = JSON.parse(localStorage.getItem("akun")) || []

            // cek duplikat ponsel (username/password)
            let cek = akun.find(user => user.username === username && user.password === password)

            if(cek){
                alert("username sudah terdaftar")
                return false
            }

            // simpan user
            let user = {
                username,
                nohp,
                password
            }

            akun.push(user)
            localStorage.setItem("akun", JSON.stringify(akun))

            alert("Registrasi berhasil")

            // pindah ke halaman login setelah registrasi
            window.location.href = "login.html"

            return false
        }
    </script>
