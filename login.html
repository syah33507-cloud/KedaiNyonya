<section>
    <div class="container">
        <div class="row justify-content-center align-items-center">
        <!-- FORM -->
            <div class="col-md-5" >
                <div class="login-card p-4 shadow">
                    <h3 class="text-center mb-4">Login</h3>

                    <form id="form-box" onsubmit="login(event)">
                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" id="username" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" id="password" class="form-control">
                        </div>


                        <div class="d-flex justify-content-between">
                            <button type="onsubmit" class="btn btn-primary form-control" style="background-color:rgb(120, 41, 194);">Login</button>
                        </div>

                        </form>

                        <p class="text-center mt-3">
                            Belum punya akun? <a href="register.html">Klik DI Sini</a>
                        </p>

                        </div>
                        
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>

<!--FOOTER-->
    <footer class="footer text-white py-4" style="background-color:rgb(120, 78, 160);">

    </footer>
    
<script src="js/bootstrap.bundle.min.js"></script>

<!-- JAVASCRIPT LOGIN -->
    <script>
        function login(event){
            
            event.preventDefault()

            let username = document.getElementById("username").value.trim()
            let password = document.getElementById("password").value.trim()

            // validasi kosong
            if(!username || !password){
                alert("Username and Password must be filled in")
                return
            }

            // ambil akun
            let akun = JSON.parse(localStorage.getItem("akun")) || []

            // cari user
            let user = akun.find(u => 
                u.username === username && u.password === password
            )

            if(!user){
                alert("Incorrect Username or Password")
                return
            }

            // simpan session login
            localStorage.setItem("userLogin", JSON.stringify(user))

            alert("Login successful")

            // pindahin ke halaman dashboard user
            window.location.href = "user.html"
        }
    </script>
</body>
